<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Kas BUMDes Mulya Karya - Unit Perkebunan</title>
    <style>
        :root {
            --primary: #00cec9;
            --success: #2ecc71;
            --danger: #ff7675;
            --dark: #2d3436;
            --light: #dfe6e9;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f3f5; margin: 0; padding: 0; }
        .container { width: 98%; max-width: 1400px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .hidden { display: none; }

        /* Header */
        .header-container { display: flex; align-items: center; border-bottom: 4px solid var(--primary); padding-bottom: 20px; margin-bottom: 30px; }
        .logo-img { width: 100px; height: 100px; object-fit: contain; margin-right: 20px; }
        .header-text h1 { margin: 0; font-size: 28px; color: var(--dark); }
        .header-text p { margin: 2px 0; color: var(--primary); font-weight: bold; }

        /* Toolbar & Nav */
        .toolbar { background: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; border: 1px dashed var(--primary); flex-wrap: wrap; gap: 10px; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 25px; }
        .nav-bar button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--light); }
        .nav-bar button.active { background: var(--primary); color: white; }

        /* Stats */
        .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { padding: 20px; border-radius: 12px; color: white; text-align: center; }
        .card-saldo { background: #0984e3; }
        .card-in { background: var(--success); }
        .card-out { background: var(--danger); }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        /* Form */
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .btn-action { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        
        .shortcut-group { margin: 10px 0; display: flex; gap: 8px; flex-wrap: wrap; }
        .shortcut-btn { background: white; border: 1px solid #bdc3c7; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; }
        .shortcut-btn:hover { border-color: var(--primary); background: #f1f2f6; }

        .btn-nota { background: #636e72; color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; border: none; }

        /* Modal Nota */
        #modal-nota { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000; }
        #modal-nota img { max-width: 90%; max-height: 90%; border: 5px solid white; border-radius: 10px; }

        @media print {
            .nav-bar, .toolbar, .btn-action, #tab-input, #login-page, .col-aksi, .shortcut-group, .btn-nota { display: none !important; }
            body { background: white; }
            .container { box-shadow: none; width: 100%; margin: 0; padding: 0; }
            th { background: #eee !important; color: black !important; border: 1px solid #000; }
            td { border: 1px solid #000; }
            .card { border: 1px solid #000; color: black !important; background: transparent !important; }
        }
    </style>
</head>
<body>

<div id="login-page" class="container" style="max-width: 400px; margin-top: 100px; text-align: center;">
    <h2>🔐 LOGIN UNIT PERKEBUNAN</h2>
    <input type="password" id="pass-input" placeholder="Masukkan Password">
    <button onclick="login()" class="btn-action" style="background: var(--dark); width: 100%; margin-top: 10px;">MASUK</button>
</div>

<div id="main-app" class="container hidden">
    <div class="header-container">
        <img src="logo.jpg" alt="Logo" class="logo-img">
        <div class="header-text">
            <h1>BUMDes Mulya Karya</h1>
            <p>Desa Gading Jaya</p>
            <p style="color: #2d3436; font-size: 14px;">UNIT PERKEBUNAN</p>
        </div>
    </div>

    <div class="nav-bar">
        <button id="btn-dash" class="active" onclick="showTab('dash')">📊 LAPORAN & RIWAYAT</button>
        <button id="btn-input" onclick="showTab('input')">📝 INPUT DATA</button>
    </div>

    <div id="tab-dash">
        <div class="toolbar">
            <div>
                <strong>🔍 Filter:</strong>
                <select id="filter-bulan" onchange="render()" style="width: 150px;">
                    <option value="all">Semua Bulan</option>
                    <option value="01">Januari</option><option value="02">Februari</option>
                    <option value="03">Maret</option><option value="04">April</option>
                    <option value="05">Mei</option><option value="06">Juni</option>
                    <option value="07">Juli</option><option value="08">Agustus</option>
                    <option value="09">September</option><option value="10">Oktober</option>
                    <option value="11">November</option><option value="12">Desember</option>
                </select>
                <input type="number" id="filter-tahun" value="2024" onchange="render()" style="width: 80px;">
            </div>
            <div>
                <button onclick="window.print()" class="btn-action" style="background:var(--dark);">🖨️ CETAK LAPORAN</button>
                <button onclick="exportData()" class="btn-action" style="background:#0984e3;">💾 Backup</button>
                <button onclick="document.getElementById('importFile').click()" class="btn-action" style="background:#6c5ce7;">📂 Restore</button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            </div>
        </div>

        <div class="grid-stats">
            <div class="card card-saldo"><small>SALDO KAS</small><h2 id="s-total">Rp 0</h2></div>
            <div class="card card-in"><small>PENDAPATAN</small><h2 id="s-in">Rp 0</h2></div>
            <div class="card card-out"><small>PENGELUARAN</small><h2 id="s-out">Rp 0</h2></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>TANGGAL</th>
                    <th>URAIAN</th>
                    <th>KATEGORI</th>
                    <th>NOMINAL</th>
                    <th>NOTA</th>
                    <th class="col-aksi">AKSI</th>
                </tr>
            </thead>
            <tbody id="tabel-body"></tbody>
        </table>
    </div>

    <div id="tab-input" class="hidden">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="background: #f9f9f9; padding: 20px; border-radius: 10px; border: 1px solid var(--success);">
                <h3 id="form-in-title">+ Simpan Pendapatan</h3>
                <input type="date" id="in-tgl">
                <input type="text" id="in-ket" placeholder="Uraian">
                <div class="shortcut-group">
                    <button class="shortcut-btn" onclick="setKet('in', 'Hasil Panen Kelapa Sawit')">+ Panen Sawit</button>
                    <button class="shortcut-btn" onclick="setKet('in', 'Penambahan Modal BUMDes')">+ Modal BUMDes</button>
                </div>
                <input type="number" id="in-jml" placeholder="Nominal Rp">
                <button id="btn-save-in" onclick="simpanData('Pendapatan')" class="btn-action" style="background:var(--success); width:100%; margin-top:10px;">SIMPAN</button>
            </div>

            <div style="background: #f9f9f9; padding: 20px; border-radius: 10px; border: 1px solid var(--danger);">
                <h3 id="form-out-title">- Simpan Pengeluaran</h3>
                <input type="date" id="out-tgl">
                <input type="text" id="out-ket" placeholder="Uraian">
                <div class="shortcut-group">
                    <button class="shortcut-btn" onclick="setKet('out', 'Upah Panen Kelapa Sawit')">Upah Panen</button>
                    <button class="shortcut-btn" onclick="setKet('out', 'Beli Pupuk')">Pupuk</button>
                    <button class="shortcut-btn" onclick="setKet('out', 'Bruning')">Bruning</button>
                </div>
                <input type="number" id="out-jml" placeholder="Nominal Rp">
                <label style="font-size: 11px;">📸 Foto Nota (Opsional):</label>
                <input type="file" id="out-nota" accept="image/*">
                <button id="btn-save-out" onclick="simpanData('Pengeluaran')" class="btn-action" style="background:var(--danger); width:100%; margin-top:10px;">SIMPAN</button>
            </div>
        </div>
        <center><button onclick="batalEdit()" id="btn-batal" class="hidden" style="margin-top:20px; padding:10px; background:#636e72; color:white; border:none; border-radius:5px; cursor:pointer;">❌ Batal Edit / Reset Form</button></center>
    </div>
</div>

<div id="modal-nota" onclick="this.style.display='none'"><img id="img-nota-view" src=""></div>

<script>
    const PASSWORD_AKSES = "admin123";
    let database = JSON.parse(localStorage.getItem('bumdes_perkebunan_final')) || [];
    let idEditSekarang = null;

    function login() {
        if(document.getElementById('pass-input').value === PASSWORD_AKSES) {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            render();
        } else { alert("Sandi Salah!"); }
    }

    function showTab(tab) {
        document.getElementById('tab-dash').classList.toggle('hidden', tab !== 'dash');
        document.getElementById('tab-input').classList.toggle('hidden', tab !== 'input');
        document.getElementById('btn-dash').classList.toggle('active', tab === 'dash');
        document.getElementById('btn-input').classList.toggle('active', tab === 'input');
    }

    function setKet(tipe, teks) { document.getElementById(tipe + '-ket').value = teks; }

    async function simpanData(kategori) {
        const t = kategori === 'Pendapatan' ? 'in' : 'out';
        const tgl = document.getElementById(t + '-tgl').value;
        const ket = document.getElementById(t + '-ket').value;
        const jml = document.getElementById(t + '-jml').value;
        let notaBase64 = "";

        if(!tgl || !ket || !jml) return alert("Lengkapi data!");

        const fileInput = document.getElementById('out-nota');
        if(kategori === 'Pengeluaran' && fileInput && fileInput.files[0]) {
            notaBase64 = await toBase64(fileInput.files[0]);
        }

        if(idEditSekarang) {
            const idx = database.findIndex(i => i.id === idEditSekarang);
            // Tetap gunakan nota lama jika tidak upload nota baru saat edit
            const notaLama = database[idx].nota;
            database[idx] = { 
                id: idEditSekarang, 
                tgl, ket, kategori, 
                jml: parseFloat(jml), 
                nota: notaBase64 || notaLama 
            };
            idEditSekarang = null;
            alert("Data diperbarui!");
        } else {
            database.push({ id: Date.now(), tgl, ket, kategori, jml: parseFloat(jml), nota: notaBase64 });
            alert("Data disimpan!");
        }

        localStorage.setItem('bumdes_perkebunan_final', JSON.stringify(database));
        batalEdit(); // Reset form
        render();
        showTab('dash');
    }

    function editData(id) {
        const item = database.find(i => i.id === id);
        idEditSekarang = id;
        showTab('input');
        const t = item.kategori === 'Pendapatan' ? 'in' : 'out';
        document.getElementById(t + '-tgl').value = item.tgl;
        document.getElementById(t + '-ket').value = item.ket;
        document.getElementById(t + '-jml').value = item.jml;
        document.getElementById('btn-batal').classList.remove('hidden');
        document.getElementById('form-'+t+'-title').innerText = "✏️ Mode Edit " + item.kategori;
    }

    function batalEdit() {
        idEditSekarang = null;
        document.getElementById('in-tgl').value = ''; document.getElementById('in-ket').value = ''; document.getElementById('in-jml').value = '';
        document.getElementById('out-tgl').value = ''; document.getElementById('out-ket').value = ''; document.getElementById('out-jml').value = '';
        if(document.getElementById('out-nota')) document.getElementById('out-nota').value = '';
        document.getElementById('btn-batal').classList.add('hidden');
        document.getElementById('form-in-title').innerText = "+ Simpan Pendapatan";
        document.getElementById('form-out-title').innerText = "- Simpan Pengeluaran";
    }

    function hapusData(id) {
        if(confirm("Hapus data ini?")) {
            database = database.filter(i => i.id !== id);
            localStorage.setItem('bumdes_perkebunan_final', JSON.stringify(database));
            render();
        }
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    function viewNota(img) {
        document.getElementById('modal-nota').style.display = 'flex';
        document.getElementById('img-nota-view').src = img;
    }

    function render() {
        const tbody = document.getElementById('tabel-body');
        const fM = document.getElementById('filter-bulan').value;
        const fY = document.getElementById('filter-tahun').value;
        let tIn = 0, tOut = 0;
        tbody.innerHTML = '';
        
        let filtered = database.filter(i => {
            const d = i.tgl.split('-');
            return (fM === 'all' || d[1] === fM) && d[0] === fY;
        }).sort((a,b) => new Date(a.tgl) - new Date(b.tgl));

        filtered.forEach(i => {
            if(i.kategori === 'Pendapatan') tIn += i.jml; else tOut += i.jml;
            tbody.innerHTML += `<tr>
                <td>${i.tgl}</td>
                <td>${i.ket}</td>
                <td style="color:${i.kategori=='Pendapatan'?'green':'red'}; font-weight:bold">${i.kategori}</td>
                <td>Rp ${i.jml.toLocaleString('id-ID')}</td>
                <td>${i.nota ? `<button class="btn-nota" onclick="viewNota('${i.nota}')">👁️ Lihat</button>` : '-'}</td>
                <td class="col-aksi">
                    <button onclick="editData(${i.id})" style="border:none; background:#fdcb6e; cursor:pointer; padding:5px; border-radius:4px;">✏️</button>
                    <button onclick="hapusData(${i.id})" style="border:none; background:none; color:red; cursor:pointer; font-size:16px; margin-left:5px;">🗑️</button>
                </td>
            </tr>`;
        });
        document.getElementById('s-in').innerText = "Rp " + tIn.toLocaleString('id-ID');
        document.getElementById('s-out').innerText = "Rp " + tOut.toLocaleString('id-ID');
        document.getElementById('s-total').innerText = "Rp " + (tIn - tOut).toLocaleString('id-ID');
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(database)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = "Backup_Unit_Perkebunan.json"; a.click();
    }

    function importData(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            database = JSON.parse(e.target.result);
            localStorage.setItem('bumdes_perkebunan_final', JSON.stringify(database));
            render(); alert("Data Berhasil Dimuat!");
        };
        reader.readAsText(event.target.files[0]);
    }
</script>
</body>
</html>
